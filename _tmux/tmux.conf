if-shell '
  v=$(tmux -V 2>/dev/null)
  v=${v#tmux }
  major=${v%%.*}
  rest=${v#*.}
  minor=${rest%%[!0-9]*}

  case $major in
    ""|*[!0-9]*) exit 1 ;;
  esac
  case $minor in
    ""|*[!0-9]*) exit 1 ;;
  esac

  [ "$major" -gt 2 ] || { [ "$major" -eq 2 ] && [ "$minor" -ge 4 ]; }
' "source-file ~/.tmux.2.4.conf" "source-file ~/.tmux.2.0.conf"
